        <div class="d-flex flex-column justify-content-center align-items-center" style="margin-top:10px;">
            <header class="fw-bold text-white fs-2 pb-3">Registro de usuarios</header>
            <small id="erroremail" style="color: red; display: none; font-weight: bold;"></small>
            <form id="form" class="p-4 rounded shadow" style="background-color: rgba(33, 37, 41, 0.6);" action="../conexiones/registrarUsuario.php" method="POST">
                <div class="mb-3 mt-3">
                    <label class="form-label text-white fw-bold" for="dni">Identificador de usuario:</label>
                    <input type="text" name="dni" class="form-control" placeholder="Ingrese su DNI" id="dni" required>
                </div>
                <div class="mb-3 mt-3">
                    <label class="form-label text-white fw-bold" for="nombre">Ingrese su nombre:</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ingrese su nombre" id="nombre" required>
                </div>
                <div class="mb-3 mt-3">
                    <label class="form-label text-white fw-bold" for="email">Ingrese su correo:</label>
                    <input type="text" name="email" class="form-control" placeholder="Ingrese su correo" id="email" required>
                </div>
                <div class="mb-3 mt-3">
                    <label class="form-label text-white fw-bold" for="telefono">Ingrese su telefono:</label>
                    <input type="text" name="telefono" class="form-control" placeholder="Ingrese su telefono" id="telefono" required>
                </div>
                <div class="mb-3 mt-3">
                    <label class="form-label text-white fw-bold" for="pais">Ingrese su país:</label><br>
                    <select name="pais" id="pais">
                        <option value="">Seleccion</option>
                        <option value="Costa Rica">Costa Rica</option>
                        <option value="Estados Unidos">Estados Unidos</option>
                        <option value="México">México</option>
                        <option value="Colombia">Colombia</option>
                        <option value="España">España</option>
                        <option value="Argentina">Argentina</option>
                        <option value="Chile">Chile</option>
                        <option value="Perú">Perú</option>
                        <option value="Panamá">Panamá</option>
                        <option value="Canadá">Canadá</option>
                    </select>
                </div>
                <div class="mb-3 mt-3">
                    <label class="form-label text-white fw-bold" for="dir">Ingrese su direccion:</label>
                    <input type="text" name="dir" class="form-control" placeholder="Ingrese su direccion" id="dir" required>
                </div>
                <div class="mb-3 mt-3">
                    <label class="form-label text-white fw-bold" for="pass">Contraseña:</label>
                    <input type="password" name="pass" class="form-control" placeholder="Ingrese su contraseña" id="pass" required>
                </div>
                <div class="mb-3 mt-3 text-center">
                    <button type="submit" class="btn btn-warning">Registrarse</button>
                </div>
            </form>
